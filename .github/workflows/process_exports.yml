name: Process Bitrix task exports

on:
  workflow_dispatch:
  push:
    paths:
      - 'data/raw/**'
      - 'src/**'
      - 'config/**'
      - 'process_exports.py'
      - 'requirements.txt'

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Process exports
        run: python process_exports.py

      - name: Upload generated reports
        uses: actions/upload-artifact@v4
        with:
          name: bitrix-task-reports
          path: |
            reports/*.csv
            data/processed/*
